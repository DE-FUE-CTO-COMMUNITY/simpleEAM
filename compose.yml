services:
  # Neo4j Database
  neo4j:
    image: neo4j:5.26
    restart: unless-stopped
    ports:
      - "${NEO4J_EXTERNAL_PORT}:${NEO4J_PORT}" # HTTP
      - "${NEO4J_EXTERNAL_BOLT_PORT}:${NEO4J_BOLT_PORT}" # Bolt
    volumes:
      - ./db/data:/data
      - ./db/logs:/logs
      - ./db/import:/import
      - ./db/plugins:/plugins
    environment:
      - NEO4J_AUTH=${NEO4J_AUTH}
      - NEO4J_dbms_memory_pagecache_size=${NEO4J_PAGECACHE_MEMORY}
      - NEO4J_dbms_memory_heap_initial__size=${NEO4J_HEAP_INITIAL_SIZE}
      - NEO4J_dbms_memory_heap_max__size=${NEO4J_HEAP_MAX_SIZE}
    networks:
      - eam-network
      - ${TRAEFIK_NETWORK}
    labels:
      - traefik.enable=true
      - traefik.http.routers.${COMPOSE_PROJECT_NAME:-nextgen-eam}-neo4j.rule=Host(`${NEO4J_SUBDOMAIN}.${BASE_DOMAIN}`)
      - traefik.http.routers.${COMPOSE_PROJECT_NAME:-nextgen-eam}-neo4j.entrypoints=websecure
      - traefik.http.routers.${COMPOSE_PROJECT_NAME:-nextgen-eam}-neo4j.tls=true
      - traefik.http.routers.${COMPOSE_PROJECT_NAME:-nextgen-eam}-neo4j.tls.certresolver=${TRAEFIK_CERTRESOLVER}
      - traefik.http.routers.${COMPOSE_PROJECT_NAME:-nextgen-eam}-neo4j.tls.domains[0].main=${NEO4J_SUBDOMAIN}.${BASE_DOMAIN}
      - traefik.http.services.${COMPOSE_PROJECT_NAME:-nextgen-eam}-neo4j.loadbalancer.server.port=${NEO4J_PORT}
      - "traefik.docker.network=${TRAEFIK_NETWORK}"

  # Server
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
      args:
        NODE_ENV: ${NODE_ENV}
    restart: unless-stopped
    ports:
      - "${GRAPHQL_EXTERNAL_PORT}:${GRAPHQL_INTERNAL_PORT}"
    depends_on:
      - neo4j
      - keycloak
    environment:
      - NODE_ENV=${NODE_ENV}
      - NEO4J_URI=bolt://neo4j:${NEO4J_BOLT_PORT}
      - NEO4J_USER=${NEO4J_USER}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - GRAPHQL_INTERNAL_PORT=${GRAPHQL_INTERNAL_PORT}
      - KEYCLOAK_URL=${KEYCLOAK_URL}
      - KEYCLOAK_REALM=${KEYCLOAK_REALM}
      - KEYCLOAK_CLIENT_ID=${KEYCLOAK_CLIENT_ID_SERVER}
      - AUTH_DEBUG=${AUTH_DEBUG}
      - NEO4J_DEBUG=${NEO4J_DEBUG}
      - NEO4J_LOG_LEVEL=${NEO4J_LOG_LEVEL}
      - TEMPORAL_ADDRESS=${TEMPORAL_ADDRESS:-temporal:7233}
      - TEMPORAL_NAMESPACE=${TEMPORAL_NAMESPACE:-default}
      - ANALYTICS_PROJECTION_TASK_QUEUE=${ANALYTICS_PROJECTION_TASK_QUEUE:-nextgen-eam-analytics}
      - ANALYTICS_PROJECTION_MAX_CONCURRENCY=${ANALYTICS_PROJECTION_MAX_CONCURRENCY:-5}
      - CLICKHOUSE_URL=${CLICKHOUSE_URL:-http://clickhouse:8123}
      - CLICKHOUSE_DB=${CLICKHOUSE_DB:-nextgen_analytics}
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-default}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-}
      - ANALYTICS_CUBE_API_URL=${ANALYTICS_CUBE_API_URL:-http://cube:4000/cubejs-api/v1}
      - CUBEJS_API_SECRET=${CUBEJS_API_SECRET:-nextgen-eam-analytics-dev}
    # No bind mounts for src, prisma, tests - everything comes from the image
    networks:
      - eam-network
      - ${TRAEFIK_NETWORK}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-nextgen-eam}-graphql.rule\
        =Host(`${API_SUBDOMAIN}.${BASE_DOMAIN}`) && (PathPrefix(`/graphql`) ||
        Path(`/health`) || PathPrefix(`/analytics`))"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-nextgen-eam}-graphql.entr\
        ypoints=websecure"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-nextgen-eam}-graphql.tls=\
        true"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-nextgen-eam}-graphql.tls.\
        certresolver=${TRAEFIK_CERTRESOLVER}"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-nextgen-eam}-graphql.tls.\
        domains[0].main=${API_SUBDOMAIN}.${BASE_DOMAIN}"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-nextgen-eam}-graphql.prio\
        rity=10"
      - "traefik.http.services.${COMPOSE_PROJECT_NAME:-nextgen-eam}-graphql.loa\
        dbalancer.server.port=${GRAPHQL_INTERNAL_PORT}"
      - "traefik.docker.network=${TRAEFIK_NETWORK}"

  # AI Server (REST endpoints for AI run orchestration)
  ai-server:
    build:
      context: .
      dockerfile: ai-server/Dockerfile
      args:
        NODE_ENV: ${NODE_ENV}
    restart: unless-stopped
    profiles:
      - ai
    ports:
      - "${AI_SERVER_EXTERNAL_PORT}:${AI_SERVER_INTERNAL_PORT}"
    depends_on:
      - keycloak
      - temporal
    entrypoint: [ "yarn" ]
    command: [ "start" ]
    environment:
      - NODE_ENV=${NODE_ENV}
      - GRAPHQL_INTERNAL_URL=http://server:${GRAPHQL_INTERNAL_PORT}/graphql
      - AI_SERVER_INTERNAL_PORT=${AI_SERVER_INTERNAL_PORT}
      - KEYCLOAK_URL=${KEYCLOAK_URL}
      - KEYCLOAK_REALM=${KEYCLOAK_REALM}
      - KEYCLOAK_CLIENT_ID=${KEYCLOAK_CLIENT_ID_SERVER}
      - KEYCLOAK_CLIENT_ID_SERVER=${KEYCLOAK_CLIENT_ID_SERVER}
      - KEYCLOAK_CLIENT_ID_CLIENT=${KEYCLOAK_CLIENT_ID_CLIENT}
      - AI_AGENT_CONFIG_BOOTSTRAP_CLIENT_ID=${AI_AGENT_CONFIG_BOOTSTRAP_CLIENT_ID:-}
      - AI_AGENT_CONFIG_BOOTSTRAP_CLIENT_SECRET=${AI_AGENT_CONFIG_BOOTSTRAP_CLIENT_SECRET:-}
      - TEMPORAL_ADDRESS=${TEMPORAL_ADDRESS:-temporal:7233}
      - TEMPORAL_NAMESPACE=${TEMPORAL_NAMESPACE:-default}
      - AI_RUN_TASK_QUEUE=${AI_RUN_TASK_QUEUE:-nextgen-eam-ai}
      - AI_LLM_URL=${AI_LLM_URL:-}
      - AI_LLM_MODEL=${AI_LLM_MODEL:-mistral-7b-instruct-v0.3}
      - AI_LLM_API_KEY=${AI_LLM_API_KEY:-}
      - AI_LLM_TIMEOUT_MS=${AI_LLM_TIMEOUT_MS:-45000}
      - AI_LLM_RETRY_COUNT=${AI_LLM_RETRY_COUNT:-1}
      - AI_LOG_LLM_PROMPT=${AI_LOG_LLM_PROMPT:-false}
      - AI_LLM_PROMPT_LOG_PREVIEW_CHARS=${AI_LLM_PROMPT_LOG_PREVIEW_CHARS:-1200}
      - AI_ALLOW_LLM_FALLBACK=${AI_ALLOW_LLM_FALLBACK:-false}
      - AI_WEB_SOURCE_COUNT=${AI_WEB_SOURCE_COUNT:-4}
      - AI_WEB_SEARCH_RESULT_COUNT=${AI_WEB_SEARCH_RESULT_COUNT:-16}
      - AI_WEB_FETCH_TIMEOUT_MS=${AI_WEB_FETCH_TIMEOUT_MS:-12000}
      - AI_SEARCH_PROVIDERS=${AI_SEARCH_PROVIDERS:-duckduckgo_html,duckduckgo_lite,wikipedia_api}
      - AI_SEARCH_SEARXNG_URL=${AI_SEARCH_SEARXNG_URL:-}
      - AI_SEARCH_SEARXNG_API_KEY=${AI_SEARCH_SEARXNG_API_KEY:-}
    networks:
      - eam-network
      - ${TRAEFIK_NETWORK}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-nextgen-eam}-ai.rule=Host\
        (`${API_SUBDOMAIN}.${BASE_DOMAIN}`) && (PathPrefix(`/ai-runs`) ||
        PathPrefix(`/ai-assistant`) || PathPrefix(`/sovereignty`))"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-nextgen-eam}-ai.entrypoin\
        ts=websecure"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-nextgen-eam}-ai.tls=true"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-nextgen-eam}-ai.tls.certr\
        esolver=${TRAEFIK_CERTRESOLVER}"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-nextgen-eam}-ai.tls.domai\
        ns[0].main=${API_SUBDOMAIN}.${BASE_DOMAIN}"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-nextgen-eam}-ai.priority=\
        100"
      - "traefik.http.services.${COMPOSE_PROJECT_NAME:-nextgen-eam}-ai.loadbala\
        ncer.server.port=${AI_SERVER_INTERNAL_PORT}"
      - "traefik.docker.network=${TRAEFIK_NETWORK}"

  # Analytics scheduler
  analytics-scheduler:
    build:
      context: .
      dockerfile: analytics/runtime/Dockerfile
      args:
        NODE_ENV: ${NODE_ENV}
    restart: unless-stopped
    depends_on:
      - temporal
    environment:
      - NODE_ENV=${NODE_ENV}
      - TEMPORAL_ADDRESS=${TEMPORAL_ADDRESS:-temporal:7233}
      - TEMPORAL_NAMESPACE=${TEMPORAL_NAMESPACE:-default}
      - ANALYTICS_PROJECTION_TASK_QUEUE=${ANALYTICS_PROJECTION_TASK_QUEUE:-nextgen-eam-analytics}
      - ANALYTICS_PROJECTION_SCHEDULE_ENABLED=${ANALYTICS_PROJECTION_SCHEDULE_ENABLED:-false}
      - ANALYTICS_PROJECTION_SCHEDULE_ID=${ANALYTICS_PROJECTION_SCHEDULE_ID:-analytics-projection-refresh}
      - ANALYTICS_PROJECTION_SCHEDULE_INTERVAL=${ANALYTICS_PROJECTION_SCHEDULE_INTERVAL:-1
        hour}
      - ANALYTICS_PROJECTION_MAX_CONCURRENCY=${ANALYTICS_PROJECTION_MAX_CONCURRENCY:-5}
      - ANALYTICS_PROJECTION_SCHEDULE_RECONCILE_MS=${ANALYTICS_PROJECTION_SCHEDULE_RECONCILE_MS:-300000}
    networks:
      - eam-network

  # Analytics worker executes projection refresh workflows on a dedicated queue
  analytics-worker:
    build:
      context: .
      dockerfile: analytics/runtime/Dockerfile
      args:
        NODE_ENV: ${NODE_ENV}
    restart: unless-stopped
    depends_on:
      - server
      - temporal
    entrypoint: [ "yarn" ]
    command: [ "analytics:worker" ]
    environment:
      - NODE_ENV=${NODE_ENV}
      - GRAPHQL_INTERNAL_URL=http://server:${GRAPHQL_INTERNAL_PORT}/graphql
      - KEYCLOAK_URL=${KEYCLOAK_URL}
      - KEYCLOAK_REALM=${KEYCLOAK_REALM}
      - KEYCLOAK_CLIENT_ID_SERVER=${KEYCLOAK_CLIENT_ID_SERVER}
      - AI_AGENT_CONFIG_BOOTSTRAP_CLIENT_ID=${AI_AGENT_CONFIG_BOOTSTRAP_CLIENT_ID:-}
      - AI_AGENT_CONFIG_BOOTSTRAP_CLIENT_SECRET=${AI_AGENT_CONFIG_BOOTSTRAP_CLIENT_SECRET:-}
      - TEMPORAL_ADDRESS=${TEMPORAL_ADDRESS:-temporal:7233}
      - TEMPORAL_NAMESPACE=${TEMPORAL_NAMESPACE:-default}
      - ANALYTICS_PROJECTION_TASK_QUEUE=${ANALYTICS_PROJECTION_TASK_QUEUE:-nextgen-eam-analytics}
      - ANALYTICS_SYNC_URL=${ANALYTICS_SYNC_URL:-http://server:${GRAPHQL_INTERNAL_PORT}/analytics/projections/sync}
    networks:
      - eam-network

  # Keycloak for authentication
  keycloak:
    image: quay.io/keycloak/keycloak:26.6
    restart: unless-stopped
    environment:
      - KC_BOOTSTRAP_ADMIN_USERNAME=${KEYCLOAK_ADMIN}
      - KC_BOOTSTRAP_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD}
      - KC_DB=${KC_DB}
      - KC_DB_URL=jdbc:postgresql://keycloak-db:5432/${KC_DB_NAME}
      - KC_DB_USERNAME=${KC_DB_USER}
      - KC_DB_PASSWORD=${KC_DB_PASSWORD}
      - KC_HOSTNAME_STRICT=false
      - KC_HTTP_ENABLED=true
      - KC_PROXY_HEADERS=xforwarded
      - KC_HEALTH_ENABLED=true
    ports:
      - "${KEYCLOAK_EXTERNAL_PORT}:${KEYCLOAK_INTERNAL_PORT}"
    command:
      - start
      - --import-realm
    volumes:
      - ./auth/src:/opt/keycloak/data/import
      - ./auth/themes:/opt/keycloak/themes
    depends_on:
      - keycloak-db
    networks:
      - eam-network
      - ${TRAEFIK_NETWORK}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-nextgen-eam}-keycloak.rul\
        e=Host(`${AUTH_SUBDOMAIN}.${BASE_DOMAIN}`)"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-nextgen-eam}-keycloak.ent\
        rypoints=websecure"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-nextgen-eam}-keycloak.tls\
        =true"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-nextgen-eam}-keycloak.tls\
        .certresolver=${TRAEFIK_CERTRESOLVER}"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-nextgen-eam}-keycloak.tls\
        .domains[0].main=${AUTH_SUBDOMAIN}.${BASE_DOMAIN}"
      - "traefik.http.services.${COMPOSE_PROJECT_NAME:-nextgen-eam}-keycloak.lo\
        adbalancer.server.port=${KEYCLOAK_INTERNAL_PORT}"
      - "traefik.docker.network=${TRAEFIK_NETWORK}"

  # Keycloak Database
  keycloak-db:
    image: postgres:15
    restart: unless-stopped
    volumes:
      - ./auth/data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${KC_DB_NAME}
      - POSTGRES_USER=${KC_DB_USER}
      - POSTGRES_PASSWORD=${KC_DB_PASSWORD}
    networks:
      - eam-network

  # Excalidraw Collaboration Room Server
  excalidraw-room:
    image: excalidraw/excalidraw-room:sha-03ff435
    restart: unless-stopped
    ports:
      - "${EXCALIDRAW_ROOM_EXTERNAL_PORT}:${EXCALIDRAW_ROOM_PORT}"
    networks:
      - eam-network
      - ${TRAEFIK_NETWORK}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-nextgen-eam}-excalidraw-r\
        oom.rule=Host(`${EXCALIDRAW_ROOM_SUBDOMAIN}.${BASE_DOMAIN}`)"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-nextgen-eam}-excalidraw-r\
        oom.entrypoints=websecure"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-nextgen-eam}-excalidraw-r\
        oom.tls=true"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-nextgen-eam}-excalidraw-r\
        oom.tls.certresolver=${TRAEFIK_CERTRESOLVER}"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-nextgen-eam}-excalidraw-r\
        oom.tls.domains[0].main=${EXCALIDRAW_ROOM_SUBDOMAIN}.${BASE_DOMAIN}"
      - "traefik.http.services.${COMPOSE_PROJECT_NAME:-nextgen-eam}-excalidraw-\
        room.loadbalancer.server.port=80"
      - "traefik.docker.network=${TRAEFIK_NETWORK}"

  # Temporal PostgreSQL (self-hosted, dedicated persistence DB)
  temporal-db:
    image: postgres:15
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${TEMPORAL_DB_NAME:-temporal}
      - POSTGRES_USER=${TEMPORAL_DB_USER:-temporal}
      - POSTGRES_PASSWORD=${TEMPORAL_DB_PASSWORD:-temporal}
    volumes:
      - ./tools/temporal/postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${TEMPORAL_DB_USER:-temporal} -d
            ${TEMPORAL_DB_NAME:-temporal}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - eam-network

  # Temporal Server (self-hosted, OSS)
  temporal:
    image: temporalio/auto-setup:1.24.2
    restart: unless-stopped
    depends_on:
      temporal-db:
        condition: service_healthy
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=${TEMPORAL_DB_USER:-temporal}
      - POSTGRES_PWD=${TEMPORAL_DB_PASSWORD:-temporal}
      - POSTGRES_SEEDS=temporal-db
    ports:
      - "${TEMPORAL_EXTERNAL_PORT:-7233}:7233"
    networks:
      - eam-network

  # Temporal UI
  temporal-ui:
    image: temporalio/ui:2.31.2
    restart: unless-stopped
    depends_on:
      - temporal
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:${TEMPORAL_UI_EXTERNAL_PORT:-8088},https://${TEMPORAL_UI_SUBDOMAIN:-temporal}.${BASE_DOMAIN}
    ports:
      - "${TEMPORAL_UI_EXTERNAL_PORT:-8088}:8080"
    networks:
      - eam-network
      - ${TRAEFIK_NETWORK}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-nextgen-eam}-temporal-ui.\
        rule=Host(`${TEMPORAL_UI_SUBDOMAIN:-temporal}.${BASE_DOMAIN}`)"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-nextgen-eam}-temporal-ui.\
        entrypoints=websecure"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-nextgen-eam}-temporal-ui.\
        tls=true"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-nextgen-eam}-temporal-ui.\
        tls.certresolver=${TEMPORAL_UI_CERTRESOLVER:-netcupdns}"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-nextgen-eam}-temporal-ui.\
        tls.domains[0].main=${TEMPORAL_UI_SUBDOMAIN:-temporal}.${BASE_DOMAIN}"
      - "traefik.http.services.${COMPOSE_PROJECT_NAME:-nextgen-eam}-temporal-ui\
        .loadbalancer.server.port=8080"
      - "traefik.docker.network=${TRAEFIK_NETWORK}"

  # AI Worker (Temporal worker for AI runs)
  ai-worker:
    build:
      context: .
      dockerfile: ai-server/Dockerfile
      args:
        NODE_ENV: ${NODE_ENV}
    restart: unless-stopped
    profiles:
      - ai
    depends_on:
      - server
      - temporal
    entrypoint: [ "yarn" ]
    command: [ "worker" ]
    environment:
      - NODE_ENV=${NODE_ENV}
      - GRAPHQL_INTERNAL_URL=http://server:${GRAPHQL_INTERNAL_PORT}/graphql
      - KEYCLOAK_URL=${KEYCLOAK_URL}
      - KEYCLOAK_REALM=${KEYCLOAK_REALM}
      - KEYCLOAK_CLIENT_ID_SERVER=${KEYCLOAK_CLIENT_ID_SERVER}
      - AI_AGENT_CONFIG_BOOTSTRAP_CLIENT_ID=${AI_AGENT_CONFIG_BOOTSTRAP_CLIENT_ID:-}
      - AI_AGENT_CONFIG_BOOTSTRAP_CLIENT_SECRET=${AI_AGENT_CONFIG_BOOTSTRAP_CLIENT_SECRET:-}
      - TEMPORAL_ADDRESS=${TEMPORAL_ADDRESS:-temporal:7233}
      - TEMPORAL_NAMESPACE=${TEMPORAL_NAMESPACE:-default}
      - AI_RUN_TASK_QUEUE=${AI_RUN_TASK_QUEUE:-nextgen-eam-ai}
      - AI_LLM_URL=${AI_LLM_URL:-}
      - AI_LLM_MODEL=${AI_LLM_MODEL:-mistral-7b-instruct-v0.3}
      - AI_LLM_API_KEY=${AI_LLM_API_KEY:-}
      - AI_LLM_TIMEOUT_MS=${AI_LLM_TIMEOUT_MS:-45000}
      - AI_LLM_RETRY_COUNT=${AI_LLM_RETRY_COUNT:-1}
      - AI_LOG_LLM_PROMPT=${AI_LOG_LLM_PROMPT:-false}
      - AI_LLM_PROMPT_LOG_PREVIEW_CHARS=${AI_LLM_PROMPT_LOG_PREVIEW_CHARS:-1200}
      - AI_ALLOW_LLM_FALLBACK=${AI_ALLOW_LLM_FALLBACK:-false}
      - AI_WEB_SOURCE_COUNT=${AI_WEB_SOURCE_COUNT:-4}
      - AI_WEB_SEARCH_RESULT_COUNT=${AI_WEB_SEARCH_RESULT_COUNT:-16}
      - AI_WEB_FETCH_TIMEOUT_MS=${AI_WEB_FETCH_TIMEOUT_MS:-12000}
      - AI_SEARCH_PROVIDERS=${AI_SEARCH_PROVIDERS:-duckduckgo_html,duckduckgo_lite,wikipedia_api}
      - AI_SEARCH_SEARXNG_URL=${AI_SEARCH_SEARXNG_URL:-}
      - AI_SEARCH_SEARXNG_API_KEY=${AI_SEARCH_SEARXNG_API_KEY:-}
    networks:
      - eam-network

  # ClickHouse projection database for analytics workloads
  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    restart: unless-stopped
    environment:
      - CLICKHOUSE_DB=${CLICKHOUSE_DB:-nextgen_analytics}
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-default}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-}
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    ports:
      - "${CLICKHOUSE_HTTP_EXTERNAL_PORT:-8123}:8123"
      - "${CLICKHOUSE_NATIVE_EXTERNAL_PORT:-9000}:9000"
    volumes:
      - ./analytics/clickhouse/data:/var/lib/clickhouse
      - ./analytics/clickhouse/log:/var/log/clickhouse-server
      - ./analytics/clickhouse/init:/docker-entrypoint-initdb.d
    networks:
      - eam-network

  # Cube semantic layer over ClickHouse projections
  cube:
    image: cubejs/cube:latest
    restart: unless-stopped
    depends_on:
      - clickhouse
      - cubestore
    environment:
      - CUBEJS_DEV_MODE=${CUBEJS_DEV_MODE:-true}
      - CUBEJS_API_SECRET=${CUBEJS_API_SECRET:-nextgen-eam-analytics-dev}
      - CUBEJS_DB_TYPE=clickhouse
      - CUBEJS_DB_HOST=clickhouse
      - CUBEJS_DB_PORT=8123
      - CUBEJS_DB_NAME=${CLICKHOUSE_DB:-nextgen_analytics}
      - CUBEJS_DB_USER=${CLICKHOUSE_USER:-default}
      - CUBEJS_DB_PASS=${CLICKHOUSE_PASSWORD:-}
      - CUBEJS_WEB_SOCKETS=${CUBEJS_WEB_SOCKETS:-true}
      - CUBEJS_CACHE_AND_QUEUE_DRIVER=${CUBEJS_CACHE_AND_QUEUE_DRIVER:-cubestore}
      - CUBEJS_CUBESTORE_HOST=${CUBEJS_CUBESTORE_HOST:-cubestore}
      - CUBEJS_CUBESTORE_PORT=${CUBEJS_CUBESTORE_PORT:-3030}
    volumes:
      - ./analytics/cube:/cube/conf
    ports:
      - "${CUBEJS_EXTERNAL_PORT:-4003}:4000"
    networks:
      - eam-network
      - ${TRAEFIK_NETWORK}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-nextgen-eam}-cube.rule=Ho\
        st(`${API_SUBDOMAIN}.${BASE_DOMAIN}`) && (PathPrefix(`/cubejs-api`) ||
        PathPrefix(`/cubejs-system`))"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-nextgen-eam}-cube.entrypo\
        ints=websecure"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-nextgen-eam}-cube.tls=true"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-nextgen-eam}-cube.tls.cer\
        tresolver=${TRAEFIK_CERTRESOLVER}"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-nextgen-eam}-cube.tls.dom\
        ains[0].main=${API_SUBDOMAIN}.${BASE_DOMAIN}"
      - "traefik.http.services.${COMPOSE_PROJECT_NAME:-nextgen-eam}-cube.loadba\
        lancer.server.port=4000"
      - "traefik.docker.network=${TRAEFIK_NETWORK}"

  cubestore:
    image: cubejs/cubestore:latest
    restart: unless-stopped
    environment:
      - CUBESTORE_SERVER_NAME=${CUBESTORE_SERVER_NAME:-cubestore:9999}
      - CUBESTORE_META_PORT=${CUBESTORE_META_PORT:-9999}
      - CUBESTORE_HTTP_PORT=${CUBESTORE_HTTP_PORT:-3030}
      - CUBESTORE_DATA_DIR=${CUBESTORE_DATA_DIR:-/cube/data}
      - CUBESTORE_REMOTE_DIR=${CUBESTORE_REMOTE_DIR:-/cube/remote}
    volumes:
      - ./analytics/cubestore/data:/cube/data
      - ./analytics/cubestore/remote:/cube/remote
    ports:
      - "${CUBESTORE_HTTP_EXTERNAL_PORT:-3030}:3030"
      - "${CUBESTORE_META_EXTERNAL_PORT:-9999}:9999"
    networks:
      - eam-network

  # Next.js Client
  client:
    build:
      context: .
      dockerfile: client/Dockerfile
    restart: unless-stopped
    ports:
      - "${CLIENT_EXTERNAL_PORT}:${CLIENT_PORT}"
    depends_on:
      - server
      - excalidraw-room
    environment:
      - NODE_ENV=production
      # Runtime configuration - passed to container for /api/runtime-config endpoint
      - GRAPHQL_URL=https://${API_SUBDOMAIN}.${BASE_DOMAIN}/graphql
      - KEYCLOAK_URL=https://${AUTH_SUBDOMAIN}.${BASE_DOMAIN}
      - KEYCLOAK_REALM=${KEYCLOAK_REALM}
      - KEYCLOAK_CLIENT_ID_CLIENT=${KEYCLOAK_CLIENT_ID_CLIENT}
      - KEYCLOAK_ADMIN=${KEYCLOAK_ADMIN}
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD}
      - EXCALIDRAW_WS_SERVER_URL=https://${EXCALIDRAW_ROOM_SUBDOMAIN}.${BASE_DOMAIN}
      - AI_LLM_URL=${AI_LLM_URL:-}
      - AI_API_URL=${AI_API_URL:-https://${API_SUBDOMAIN}.${BASE_DOMAIN}}
      - ANALYTICS_ENABLED=${ANALYTICS_ENABLED:-true}
      - ANALYTICS_API_URL=${ANALYTICS_API_URL:-https://${API_SUBDOMAIN}.${BASE_DOMAIN}/analytics}
      - ANALYTICS_CUBE_API_URL=${ANALYTICS_CUBE_API_URL:-https://${API_SUBDOMAIN}.${BASE_DOMAIN}/cubejs-api/v1}
      - BRAND_NAME_LONG=${BRAND_NAME_LONG:-NextGen Enterprise Architecture
        Management}
      - BRAND_NAME_SHORT=${BRAND_NAME_SHORT:-NextGen EAM}
      - THEME_PRIMARY_COLOR=${THEME_PRIMARY_COLOR}
      - THEME_SECONDARY_COLOR=${THEME_SECONDARY_COLOR}
      - THEME_FONT_FAMILY=${THEME_FONT_FAMILY}
      - LOGO_URL=${LOGO_URL}
      - LOGO_ALT=${LOGO_ALT}
      - LOGO_DARK_URL=${LOGO_DARK_URL:-}
      - LOGO_LENGTH=${LOGO_LENGTH:-120}
      - FAVICON_URL=${FAVICON_URL:-/favicon.ico}
      - DRAWER_WIDTH=${DRAWER_WIDTH:-240}
    networks:
      - eam-network
      - ${TRAEFIK_NETWORK}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-nextgen-eam}-client.rule=\
        Host(`${CLIENT_SUBDOMAIN}.${BASE_DOMAIN}`)"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-nextgen-eam}-client.entry\
        points=websecure"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-nextgen-eam}-client.tls=t\
        rue"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-nextgen-eam}-client.tls.c\
        ertresolver=${TRAEFIK_CERTRESOLVER}"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-nextgen-eam}-client.tls.d\
        omains[0].main=${CLIENT_SUBDOMAIN}.${BASE_DOMAIN}"
      - "traefik.http.services.${COMPOSE_PROJECT_NAME:-nextgen-eam}-client.load\
        balancer.server.port=${CLIENT_PORT}"
      - "traefik.docker.network=${TRAEFIK_NETWORK}"

networks:
  eam-network:
    driver: bridge
  traefik:
    external: true
