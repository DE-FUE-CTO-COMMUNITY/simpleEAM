{{- if .Values.keycloak.bootstrapJob.enabled }}
{{- $fullName := include "nextgen-eam.fullname" . -}}
{{- $labels := include "nextgen-eam.labels" . -}}
{{- $realm := .Values.keycloak.realm -}}
{{- $clientHost := printf "https://%s.%s" .Values.ingress.subdomains.client .Values.global.baseDomain -}}
{{- $apiHost := printf "https://%s.%s" .Values.ingress.subdomains.api .Values.global.baseDomain -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ $fullName }}-keycloak-bootstrap
  labels: {{- $labels | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: {{ .Values.keycloak.bootstrapJob.backoffLimit }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "nextgen-eam.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: keycloak-bootstrap
    spec:
      restartPolicy: OnFailure
      {{- if .Values.global.imagePullSecrets }}
      imagePullSecrets: {{- toYaml .Values.global.imagePullSecrets | nindent 8 }}
      {{- end }}
      containers:
        - name: keycloak-bootstrap
          image: {{ printf "%s:%s" .Values.keycloak.image.repository .Values.keycloak.image.tag }}
          imagePullPolicy: {{ .Values.keycloak.image.pullPolicy }}
          env:
            - name: KC_URL
              value: {{ printf "http://%s-keycloak:8080" $fullName | quote }}
            - name: KC_REALM
              value: {{ $realm | quote }}
            - name: KC_ADMIN_USER
              value: {{ .Values.keycloak.admin.username | quote }}
            - name: KC_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ default (printf "%s-keycloak-admin" $fullName) .Values.keycloak.admin.existingSecret }}
                  key: {{ default "adminPassword" .Values.keycloak.admin.existingSecretPasswordKey }}
            - name: SERVER_CLIENT_ID
              value: {{ .Values.keycloak.clientIdServer | quote }}
            - name: CLIENT_CLIENT_ID
              value: {{ .Values.keycloak.clientIdClient | quote }}
            - name: CLIENT_PUBLIC_HOST
              value: {{ $clientHost | quote }}
            - name: API_PUBLIC_HOST
              value: {{ $apiHost | quote }}
          command:
            - /bin/sh
            - -ec
            - |
              echo "Waiting for Keycloak admin API ..."
              for i in $(seq 1 60); do
                if /opt/keycloak/bin/kcadm.sh config credentials --server "$KC_URL" --realm master --user "$KC_ADMIN_USER" --password "$KC_ADMIN_PASSWORD" >/dev/null 2>&1; then
                  break
                fi
                sleep 5
              done

              /opt/keycloak/bin/kcadm.sh config credentials --server "$KC_URL" --realm master --user "$KC_ADMIN_USER" --password "$KC_ADMIN_PASSWORD" >/dev/null

              if /opt/keycloak/bin/kcadm.sh get "realms/${KC_REALM}" >/dev/null 2>&1; then
                echo "Realm ${KC_REALM} already exists - skipping import"
              else
                echo "Importing realm ${KC_REALM}"
                /opt/keycloak/bin/kcadm.sh create realms -f /opt/keycloak/bootstrap/realm-export.json
              fi

              get_client_uuid() {
                cid="$1"
                /opt/keycloak/bin/kcadm.sh get clients -r "$KC_REALM" -q clientId="$cid" --fields id --format csv --noquotes 2>/dev/null | head -n1
              }

              sync_client_urls() {
                cid="$1"
                public_host="$2"
                local_host="$3"
                uuid="$(get_client_uuid "$cid")"
                if [ -z "$uuid" ]; then
                  echo "Client $cid not found in realm ${KC_REALM}"
                  return
                fi

                /opt/keycloak/bin/kcadm.sh update "clients/${uuid}" -r "$KC_REALM" \
                  -s "rootUrl=${public_host}" \
                  -s "baseUrl=${public_host}" \
                  -s "redirectUris=[\"${local_host}/*\",\"${public_host}/*\"]" \
                  -s "webOrigins=[\"${local_host}\",\"${public_host}\"]"

                echo "Synced URLs for client $cid"
              }

              sync_webauthn_passkey_policy() {
                /opt/keycloak/bin/kcadm.sh update "realms/${KC_REALM}" \
                  -s 'webAuthnPolicyRpEntityName=keycloak' \
                  -s 'webAuthnPolicySignatureAlgorithms=["ES256"]' \
                  -s 'webAuthnPolicyRpId=' \
                  -s 'webAuthnPolicyAttestationConveyancePreference=not specified' \
                  -s 'webAuthnPolicyAuthenticatorAttachment=not specified' \
                  -s 'webAuthnPolicyRequireResidentKey=No' \
                  -s 'webAuthnPolicyUserVerificationRequirement=not specified' \
                  -s 'webAuthnPolicyCreateTimeout=0' \
                  -s 'webAuthnPolicyAvoidSameAuthenticatorRegister=false' \
                  -s 'webAuthnPolicyAcceptableAaguids=[]' \
                  -s 'webAuthnPolicyExtraOrigins=[]' \
                  -s 'webAuthnPolicyPasswordlessRpEntityName=NextGen EAM' \
                  -s 'webAuthnPolicyPasswordlessSignatureAlgorithms=["ES256","RS256"]' \
                  -s 'webAuthnPolicyPasswordlessRpId=' \
                  -s 'webAuthnPolicyPasswordlessAttestationConveyancePreference=not specified' \
                  -s 'webAuthnPolicyPasswordlessAuthenticatorAttachment=not specified' \
                  -s 'webAuthnPolicyPasswordlessRequireResidentKey=Yes' \
                  -s 'webAuthnPolicyPasswordlessUserVerificationRequirement=required' \
                  -s 'webAuthnPolicyPasswordlessCreateTimeout=0' \
                  -s 'webAuthnPolicyPasswordlessAvoidSameAuthenticatorRegister=false' \
                  -s 'webAuthnPolicyPasswordlessAcceptableAaguids=[]' \
                  -s 'webAuthnPolicyPasswordlessExtraOrigins=[]' \
                  -s 'webAuthnPolicyPasswordlessPasskeysEnabled=true'

                echo "Synchronized WebAuthn passkey policy for realm ${KC_REALM}"
              }

              ensure_realm_role() {
                role_name="$1"
                role_description="$2"

                if /opt/keycloak/bin/kcadm.sh get "roles/${role_name}" -r "$KC_REALM" >/dev/null 2>&1; then
                  /opt/keycloak/bin/kcadm.sh update "roles/${role_name}" -r "$KC_REALM" \
                    -s "name=${role_name}" \
                    -s "description=${role_description}"
                  echo "Updated realm role ${role_name}"
                else
                  /opt/keycloak/bin/kcadm.sh create roles -r "$KC_REALM" \
                    -s "name=${role_name}" \
                    -s "description=${role_description}"
                  echo "Created realm role ${role_name}"
                fi
              }

              ensure_realm_roles() {
                ensure_realm_role "admin" "Administrator mit vollen Zugriffsrechten"
                ensure_realm_role "architect" "Enterprise Architekt mit Bearbeitungsrechten"
                ensure_realm_role "company-admin" "Unternehmensadministrator mit Zugriff auf zugewiesene Unternehmenseinstellungen"
                ensure_realm_role "viewer" "Betrachter mit Leserechten"
              }

              ensure_realm_admin_user() {
                realm_admin_id="$(/opt/keycloak/bin/kcadm.sh get users -r "$KC_REALM" -q username=admin --fields id --format csv --noquotes 2>/dev/null | head -n1)"

                if [ -z "$realm_admin_id" ]; then
                  echo "Creating realm user admin"
                  /opt/keycloak/bin/kcadm.sh create users -r "$KC_REALM" \
                    -s username=admin \
                    -s enabled=true \
                    -s emailVerified=true \
                    -s firstName=Admin \
                    -s lastName=User \
                    -s email=admin@example.com

                  /opt/keycloak/bin/kcadm.sh add-roles -r "$KC_REALM" --uusername admin --rolename admin
                fi

                /opt/keycloak/bin/kcadm.sh set-password -r "$KC_REALM" --username admin --new-password "$KC_ADMIN_PASSWORD"
                echo "Synchronized password for realm user admin from Helm secret"
              }

              sync_client_urls "$SERVER_CLIENT_ID" "$API_PUBLIC_HOST" "http://localhost:4000"
              sync_client_urls "$CLIENT_CLIENT_ID" "$CLIENT_PUBLIC_HOST" "http://localhost:3000"
              sync_webauthn_passkey_policy
              ensure_realm_roles
              ensure_realm_admin_user
          volumeMounts:
            - name: realm-bootstrap
              mountPath: /opt/keycloak/bootstrap
              readOnly: true
      volumes:
        - name: realm-bootstrap
          configMap:
            name: {{ $fullName }}-realm-import
{{- end }}
