{{- if .Values.ingress.enabled }}
{{- $fullName := include "nextgen-eam.fullname" . -}}
{{- $labels := include "nextgen-eam.labels" . -}}
{{- $domain := .Values.global.baseDomain -}}
{{- $subs := .Values.ingress.subdomains -}}
{{- $tls := .Values.ingress.tls -}}
{{- $tlsOverride := .Values.ingress.tlsSecretOverride -}}

# ── Client (Next.js) ──────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullName }}-client
  labels: {{- $labels | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations: {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if $tls }}
  tls:
    - hosts:
        - {{ printf "%s.%s" $subs.client $domain }}
      secretName: {{ default (printf "%s-client-tls" $fullName) (get $tlsOverride "client") }}
  {{- end }}
  rules:
    - host: {{ printf "%s.%s" $subs.client $domain }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $fullName }}-client
                port:
                  number: {{ .Values.client.port }}
---
# ── API (GraphQL + AI Server) ─────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullName }}-api
  labels: {{- $labels | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations: {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if $tls }}
  tls:
    - hosts:
        - {{ printf "%s.%s" $subs.api $domain }}
      secretName: {{ default (printf "%s-api-tls" $fullName) (get $tlsOverride "api") }}
  {{- end }}
  rules:
    - host: {{ printf "%s.%s" $subs.api $domain }}
      http:
        paths:
          {{- if .Values.analytics.enabled }}
          - path: /cubejs-api
            pathType: Prefix
            backend:
              service:
                name: {{ $fullName }}-cube
                port:
                  number: {{ .Values.analytics.cube.port }}
          - path: /cubejs-system
            pathType: Prefix
            backend:
              service:
                name: {{ $fullName }}-cube
                port:
                  number: {{ .Values.analytics.cube.port }}
          {{- end }}
          {{- if .Values.ai.enabled }}
          - path: /ai-runs
            pathType: Prefix
            backend:
              service:
                name: {{ $fullName }}-ai-server
                port:
                  number: {{ .Values.ai.server.port }}
          {{- end }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $fullName }}-server
                port:
                  number: {{ .Values.server.port }}
---
# ── Authentication (Keycloak) ─────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullName }}-auth
  labels: {{- $labels | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations: {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if $tls }}
  tls:
    - hosts:
        - {{ printf "%s.%s" $subs.auth $domain }}
      secretName: {{ default (printf "%s-auth-tls" $fullName) (get $tlsOverride "auth") }}
  {{- end }}
  rules:
    - host: {{ printf "%s.%s" $subs.auth $domain }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $fullName }}-keycloak
                port:
                  number: 8080
---
# ── Neo4j Browser ────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullName }}-neo4j
  labels: {{- $labels | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations: {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if $tls }}
  tls:
    - hosts:
        - {{ printf "%s.%s" $subs.neo4j $domain }}
      secretName: {{ default (printf "%s-neo4j-tls" $fullName) (get $tlsOverride "neo4j") }}
  {{- end }}
  rules:
    - host: {{ printf "%s.%s" $subs.neo4j $domain }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $fullName }}-neo4j
                port:
                  number: 7474
{{- if .Values.excalidrawRoom.enabled }}
---
