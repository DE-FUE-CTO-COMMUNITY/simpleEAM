{{- $fullName := include "nextgen-eam.fullname" . -}}
{{- $labels := include "nextgen-eam.labels" . -}}
{{- $neo4j := .Values.neo4j -}}
# ── PersistentVolumeClaim ──────────────────────────────────────────────────────
{{- if $neo4j.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ $fullName }}-neo4j
  labels: {{- $labels | nindent 4 }}
spec:
  accessModes:
    - {{ $neo4j.persistence.accessMode }}
  resources:
    requests:
      storage: {{ $neo4j.persistence.size }}
  {{- if $neo4j.persistence.storageClass }}
  storageClassName: {{ $neo4j.persistence.storageClass }}
  {{- end }}
---
{{- end }}
# ── Service ───────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: {{ $fullName }}-neo4j
  labels: {{- $labels | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 7474
      targetPort: 7474
    - name: bolt
      port: 7687
      targetPort: 7687
  selector:
    app.kubernetes.io/name: {{ include "nextgen-eam.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: neo4j
---
# ── Deployment ────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ $fullName }}-neo4j
  labels: {{- $labels | nindent 4 }}
spec:
  serviceName: {{ $fullName }}-neo4j
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "nextgen-eam.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: neo4j
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "nextgen-eam.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: neo4j
    spec:
      {{- if .Values.global.imagePullSecrets }}
      imagePullSecrets: {{- toYaml .Values.global.imagePullSecrets | nindent 8 }}
      {{- end }}
      initContainers:
        - name: neo4j-apoc-init
          image: {{ printf "%s:%s" $neo4j.image.repository $neo4j.image.tag }}
          imagePullPolicy: {{ $neo4j.image.pullPolicy }}
          command:
            - /bin/bash
            - -ec
            - |
              APJAR="$(ls -1 /var/lib/neo4j/labs/apoc-*.jar 2>/dev/null | head -n1 || true)"
              if [ -z "$APJAR" ]; then
                echo "APOC jar not found in /var/lib/neo4j/labs"
                exit 1
              fi
              cp "$APJAR" /plugins/apoc.jar
              ls -l /plugins
          volumeMounts:
            - name: plugins
              mountPath: /plugins
      containers:
        - name: neo4j
          image: {{ printf "%s:%s" $neo4j.image.repository $neo4j.image.tag }}
          imagePullPolicy: {{ $neo4j.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 7474
            - name: bolt
              containerPort: 7687
          env:
            - name: NEO4J_AUTH
              valueFrom:
                secretKeyRef:
                  name: {{ default (printf "%s-neo4j" $fullName) $neo4j.auth.existingSecret }}
                  key: {{ default "NEO4J_AUTH" (ternary "NEO4J_AUTH" "" (not $neo4j.auth.existingSecret)) }}
            - name: NEO4J_dbms_memory_pagecache_size
              valueFrom:
                configMapKeyRef:
                  name: {{ $fullName }}-config
                  key: NEO4J_PAGECACHE_MEMORY
            - name: NEO4J_dbms_memory_heap_initial__size
              valueFrom:
                configMapKeyRef:
                  name: {{ $fullName }}-config
                  key: NEO4J_HEAP_INITIAL_SIZE
            - name: NEO4J_dbms_memory_heap_max__size
              valueFrom:
                configMapKeyRef:
                  name: {{ $fullName }}-config
                  key: NEO4J_HEAP_MAX_SIZE
            - name: NEO4J_apoc_export_file_enabled
              value: "true"
            - name: NEO4J_apoc_import_file_enabled
              value: "true"
            - name: NEO4J_dbms_security_procedures_allowlist
              value: "apoc.*"
            - name: NEO4J_dbms_security_procedures_unrestricted
              value: "apoc.*"
          livenessProbe:
            httpGet:
              path: /
              port: 7474
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 7474
            initialDelaySeconds: 30
            periodSeconds: 10
          resources: {{- toYaml $neo4j.resources | nindent 12 }}
          volumeMounts:
            - name: plugins
              mountPath: /plugins
          {{- if $neo4j.persistence.enabled }}
            - name: data
              mountPath: /data
          {{- end }}
      volumes:
        - name: plugins
          emptyDir: {}
      {{- if $neo4j.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ $fullName }}-neo4j
      {{- end }}
