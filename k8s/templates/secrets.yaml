{{/* Neo4j secret */}}
{{- if not .Values.neo4j.auth.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "nextgen-eam.fullname" . }}-neo4j
  labels: {{- include "nextgen-eam.labels" . | nindent 4 }}
type: Opaque
stringData:
  password: {{ required "neo4j.auth.password is required" .Values.neo4j.auth.password | quote }}
  NEO4J_AUTH: {{ printf "neo4j/%s" .Values.neo4j.auth.password | quote }}
{{- end }}
---
{{/* Keycloak admin secret */}}
{{- if not .Values.keycloak.admin.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "nextgen-eam.fullname" . }}-keycloak-admin
  labels: {{- include "nextgen-eam.labels" . | nindent 4 }}
type: Opaque
stringData:
  adminPassword: {{ required "keycloak.admin.password is required" .Values.keycloak.admin.password | quote }}
{{- end }}
---
{{/* Keycloak DB secret */}}
{{- if not .Values.keycloak.db.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "nextgen-eam.fullname" . }}-keycloak-db
  labels: {{- include "nextgen-eam.labels" . | nindent 4 }}
type: Opaque
stringData:
  password: {{ required "keycloak.db.password is required" .Values.keycloak.db.password | quote }}
{{- end }}
---
{{/* Analytics secret */}}
{{- if or .Values.analytics.clickhouse.password .Values.analytics.cube.apiSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "nextgen-eam.fullname" . }}-analytics
  labels: {{- include "nextgen-eam.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.analytics.clickhouse.password }}
  clickhousePassword: {{ .Values.analytics.clickhouse.password | quote }}
  {{- end }}
  {{- if .Values.analytics.cube.apiSecret }}
  cubeApiSecret: {{ .Values.analytics.cube.apiSecret | quote }}
  {{- end }}
{{- end }}
{{- $analyticsRuntimeAuth := .Values.analytics.runtime.auth -}}
{{- $legacyAgentAuth := .Values.ai.agentConfig -}}
{{- $analyticsRuntimeExistingSecret := default $legacyAgentAuth.existingSecret $analyticsRuntimeAuth.existingSecret -}}
{{- $analyticsRuntimeBootstrapClientId := default $legacyAgentAuth.bootstrapClientId $analyticsRuntimeAuth.bootstrapClientId -}}
{{- $analyticsRuntimeBootstrapClientSecret := default $legacyAgentAuth.bootstrapClientSecret $analyticsRuntimeAuth.bootstrapClientSecret -}}
{{- if and .Values.analytics.enabled .Values.analytics.runtime.enabled (not $analyticsRuntimeExistingSecret) $analyticsRuntimeBootstrapClientSecret }}
---
{{/* Analytics runtime Keycloak bootstrap secret */}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "nextgen-eam.fullname" . }}-analytics-runtime-auth
  labels: {{- include "nextgen-eam.labels" . | nindent 4 }}
type: Opaque
stringData:
  clientId: {{ $analyticsRuntimeBootstrapClientId | quote }}
  clientSecret: {{ $analyticsRuntimeBootstrapClientSecret | quote }}
{{- end }}
{{- if and .Values.temporal.enabled (or .Values.ai.enabled (and .Values.analytics.enabled .Values.analytics.runtime.enabled)) }}
---
{{/* Temporal DB secret */}}
{{- if not .Values.ai.temporal.db.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "nextgen-eam.fullname" . }}-temporal-db
  labels: {{- include "nextgen-eam.labels" . | nindent 4 }}
type: Opaque
stringData:
  password: {{ required "ai.temporal.db.password is required when Temporal is enabled" .Values.ai.temporal.db.password | quote }}
{{- end }}
{{- end }}
{{- if .Values.ai.enabled }}
---
{{/* AI LLM secret */}}
{{- if and (not .Values.ai.llm.existingSecret) .Values.ai.llm.apiKey }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "nextgen-eam.fullname" . }}-ai-llm
  labels: {{- include "nextgen-eam.labels" . | nindent 4 }}
type: Opaque
stringData:
  apiKey: {{ .Values.ai.llm.apiKey | quote }}
{{- end }}
---
{{/* AI AgentConfig bootstrap secret */}}
{{- if and (not .Values.ai.agentConfig.existingSecret) .Values.ai.agentConfig.bootstrapClientSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "nextgen-eam.fullname" . }}-ai-agent-config
  labels: {{- include "nextgen-eam.labels" . | nindent 4 }}
type: Opaque
stringData:
  clientId: {{ .Values.ai.agentConfig.bootstrapClientId | quote }}
  clientSecret: {{ .Values.ai.agentConfig.bootstrapClientSecret | quote }}
{{- end }}
---
{{/* SearXNG API key secret */}}
{{- if and (not .Values.ai.web.searxngExistingSecret) .Values.ai.web.searxngApiKey }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "nextgen-eam.fullname" . }}-ai-searxng
  labels: {{- include "nextgen-eam.labels" . | nindent 4 }}
type: Opaque
stringData:
  apiKey: {{ .Values.ai.web.searxngApiKey | quote }}
{{- end }}
{{- end }}
