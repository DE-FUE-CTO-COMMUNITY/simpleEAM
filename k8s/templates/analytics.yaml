apiVersion: v1
kind: Service
metadata:
  name: {{ $fullName }}-clickhouse
  labels: {{- $labels | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8123
      targetPort: 8123
    - name: native
      port: 9000
      targetPort: 9000
  selector:
    app.kubernetes.io/name: {{ include "nextgen-eam.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: clickhouse
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ $fullName }}-clickhouse
  labels: {{- $labels | nindent 4 }}
spec:
  serviceName: {{ $fullName }}-clickhouse
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "nextgen-eam.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: clickhouse
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "nextgen-eam.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: clickhouse
    spec:
      {{- if $global.imagePullSecrets }}
      imagePullSecrets: {{- toYaml $global.imagePullSecrets | nindent 8 }}
      {{- end }}
      containers:
        - name: clickhouse
          image: {{ printf "%s:%s" $clickhouse.image.repository $clickhouse.image.tag }}
          imagePullPolicy: {{ $clickhouse.image.pullPolicy }}
          ports:
            - containerPort: 8123
              name: http
            - containerPort: 9000
              name: native
          env:
            - name: CLICKHOUSE_DB
              value: {{ $clickhouse.db | quote }}
            - name: CLICKHOUSE_USER
              value: {{ $clickhouse.user | quote }}
            - name: CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT
              value: "1"
            {{- if $clickhouse.password }}
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $fullName }}-analytics
                  key: clickhousePassword
            {{- end }}
          volumeMounts:
            - name: init
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
            - name: data
              mountPath: /var/lib/clickhouse
          resources: {{- toYaml $clickhouse.resources | nindent 12 }}
      volumes:
        - name: init
          configMap:
            name: {{ $fullName }}-clickhouse-init
  {{- if $clickhouse.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - {{ $clickhouse.persistence.accessMode }}
        {{- if $clickhouse.persistence.storageClass }}
        storageClassName: {{ $clickhouse.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ $clickhouse.persistence.size }}
  {{- else }}
  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Delete
    whenScaled: Delete
  {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $fullName }}-cube
  labels: {{- $labels | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ $cube.port }}
      targetPort: {{ $cube.port }}
  selector:
    app.kubernetes.io/name: {{ include "nextgen-eam.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: cube
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fullName }}-cube
  labels: {{- $labels | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "nextgen-eam.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: cube
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "nextgen-eam.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: cube
    spec:
      {{- if $global.imagePullSecrets }}
      imagePullSecrets: {{- toYaml $global.imagePullSecrets | nindent 8 }}
      {{- end }}
      containers:
        - name: cube
          image: {{ printf "%s:%s" $cube.image.repository $cube.image.tag }}
          imagePullPolicy: {{ $cube.image.pullPolicy }}
          ports:
            - containerPort: {{ $cube.port }}
              name: http
          env:
            - name: PORT
              value: {{ $cube.port | quote }}
            - name: CUBEJS_DEV_MODE
              value: {{ $cube.devMode | quote }}
            - name: CUBEJS_WEB_SOCKETS
              value: {{ $cube.webSockets | quote }}
            - name: CUBEJS_CACHE_AND_QUEUE_DRIVER
              value: {{ $cube.cacheAndQueueDriver | quote }}
            - name: CUBEJS_SCHEMA_PATH
              value: /cube/conf/model
            - name: CUBEJS_DB_TYPE
              value: clickhouse
            - name: CUBEJS_DB_HOST
              value: {{ printf "%s-clickhouse" $fullName | quote }}
            - name: CUBEJS_DB_PORT
              value: "8123"
            - name: CUBEJS_DB_NAME
              value: {{ $clickhouse.db | quote }}
            - name: CUBEJS_DB_USER
              value: {{ $clickhouse.user | quote }}
            - name: CUBEJS_CUBESTORE_HOST
              value: {{ printf "%s-cubestore-router" $fullName | quote }}
            - name: CUBEJS_CUBESTORE_PORT
              value: {{ $cubestore.router.httpPort | quote }}
            {{- if $clickhouse.password }}
            - name: CUBEJS_DB_PASS
              valueFrom:
                secretKeyRef:
                  name: {{ $fullName }}-analytics
                  key: clickhousePassword
            {{- end }}
            {{- if $cube.apiSecret }}
            - name: CUBEJS_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ $fullName }}-analytics
                  key: cubeApiSecret
            {{- end }}
          volumeMounts:
            - name: cube-schema
              mountPath: /cube/conf
              readOnly: true
          resources: {{- toYaml $cube.resources | nindent 12 }}
      volumes:
        - name: cube-schema
          configMap:
            name: {{ $fullName }}-cube-schema
            items:
              - key: cube.js
                path: cube.js
              - key: ApplicationProjection.js
                path: model/ApplicationProjection.js
              - key: BusinessCapabilityProjection.js
                path: model/BusinessCapabilityProjection.js
              - key: AiComponentProjection.js
                path: model/AiComponentProjection.js
              - key: DataObjectProjection.js
                path: model/DataObjectProjection.js
              - key: ApplicationInterfaceProjection.js
                path: model/ApplicationInterfaceProjection.js
              - key: InfrastructureProjection.js
                path: model/InfrastructureProjection.js
              - key: CapabilityCoverageProjection.js
                path: model/CapabilityCoverageProjection.js
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $fullName }}-cubestore-router
  labels: {{- $labels | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ $cubestore.router.httpPort }}
      targetPort: http
    - name: meta
      port: {{ $cubestore.router.metaPort }}
      targetPort: meta
  selector:
    app.kubernetes.io/name: {{ include "nextgen-eam.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: cubestore-router
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $fullName }}-cubestore-worker
  labels: {{- $labels | nindent 4 }}
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  ports:
    - name: worker
      port: {{ $cubestore.worker.port }}
      targetPort: worker
  selector:
    app.kubernetes.io/name: {{ include "nextgen-eam.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: cubestore-worker
---
{{- if $cubestore.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ $fullName }}-cubestore-remote
  labels: {{- $labels | nindent 4 }}
spec:
  accessModes:
    - {{ $cubestore.persistence.accessMode }}
  {{- if $cubestore.persistence.storageClass }}
  storageClassName: {{ $cubestore.persistence.storageClass | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ $cubestore.persistence.size }}
{{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fullName }}-cubestore-router
  labels: {{- $labels | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "nextgen-eam.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: cubestore-router
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "nextgen-eam.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: cubestore-router
    spec:
      {{- if $global.imagePullSecrets }}
      imagePullSecrets: {{- toYaml $global.imagePullSecrets | nindent 8 }}
      {{- end }}
      containers:
        - name: cubestore-router
          image: {{ printf "%s:%s" $cubestore.image.repository $cubestore.image.tag }}
          imagePullPolicy: {{ $cubestore.image.pullPolicy }}
          ports:
            - containerPort: {{ $cubestore.router.httpPort }}
              name: http
            - containerPort: {{ $cubestore.router.metaPort }}
              name: meta
          env:
            - name: CUBESTORE_SERVER_NAME
              value: {{ printf "%s-cubestore-router:%d" $fullName (int $cubestore.router.metaPort) | quote }}
            - name: CUBESTORE_META_PORT
              value: {{ $cubestore.router.metaPort | quote }}
            - name: CUBESTORE_HTTP_PORT
              value: {{ $cubestore.router.httpPort | quote }}
            - name: CUBESTORE_WORKERS
              value: {{ include "nextgen-eam.cubestoreWorkers" . | quote }}
            - name: CUBESTORE_REMOTE_DIR
              value: /cube/remote
            - name: CUBESTORE_DATA_DIR
              value: /cube/data
          volumeMounts:
            - name: scratch
              mountPath: /cube/data
            - name: remote
              mountPath: /cube/remote
          resources: {{- toYaml $cubestore.router.resources | nindent 12 }}
      volumes:
        - name: scratch
          emptyDir: {}
        - name: remote
          {{- if $cubestore.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ $fullName }}-cubestore-remote
          {{- else }}
          emptyDir: {}
          {{- end }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ $fullName }}-cubestore-worker
  labels: {{- $labels | nindent 4 }}
spec:
  serviceName: {{ $fullName }}-cubestore-worker
  replicas: {{ $cubestore.worker.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "nextgen-eam.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: cubestore-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "nextgen-eam.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: cubestore-worker
    spec:
      {{- if $global.imagePullSecrets }}
      imagePullSecrets: {{- toYaml $global.imagePullSecrets | nindent 8 }}
      {{- end }}
      containers:
        - name: cubestore-worker
          image: {{ printf "%s:%s" $cubestore.image.repository $cubestore.image.tag }}
          imagePullPolicy: {{ $cubestore.image.pullPolicy }}
          ports:
            - containerPort: {{ $cubestore.worker.port }}
              name: worker
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: CUBESTORE_SERVER_NAME
              value: $(POD_NAME).{{ $fullName }}-cubestore-worker:{{ $cubestore.worker.port }}
            - name: CUBESTORE_WORKER_PORT
              value: {{ $cubestore.worker.port | quote }}
            - name: CUBESTORE_META_ADDR
              value: {{ printf "%s-cubestore-router:%d" $fullName (int $cubestore.router.metaPort) | quote }}
            - name: CUBESTORE_WORKERS
              value: {{ include "nextgen-eam.cubestoreWorkers" . | quote }}
            - name: CUBESTORE_REMOTE_DIR
              value: /cube/remote
            - name: CUBESTORE_DATA_DIR
              value: /cube/data
          volumeMounts:
            - name: scratch
              mountPath: /cube/data
            - name: remote
              mountPath: /cube/remote
          resources: {{- toYaml $cubestore.worker.resources | nindent 12 }}
      volumes:
        - name: scratch
          emptyDir: {}
        - name: remote
          {{- if $cubestore.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ $fullName }}-cubestore-remote
          {{- else }}
          emptyDir: {}
          {{- end }}
{{- end }}