{{- $fullName := include "nextgen-eam.fullname" . -}}
{{- $labels := include "nextgen-eam.labels" . -}}
{{- $er := .Values.excalidrawRoom -}}
{{- if $er.enabled }}
# ── Service ───────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: {{ $fullName }}-excalidraw-room
  labels: {{- $labels | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ $er.port }}
      targetPort: {{ $er.port }}
      name: ws
  selector:
    app.kubernetes.io/name: {{ include "nextgen-eam.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: excalidraw-room
---
# ── Deployment ────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fullName }}-excalidraw-room
  labels: {{- $labels | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "nextgen-eam.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: excalidraw-room
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "nextgen-eam.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: excalidraw-room
    spec:
      containers:
        - name: excalidraw-room
          image: {{ printf "%s:%s" $er.image.repository $er.image.tag }}
          imagePullPolicy: {{ $er.image.pullPolicy }}
          ports:
            - containerPort: {{ $er.port }}
              name: ws
          resources: {{- toYaml $er.resources | nindent 12 }}
{{- end }}
