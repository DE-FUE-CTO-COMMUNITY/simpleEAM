<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Äußeres Quadrat -->
  <rect x="10" y="10" width="80" height="80" rx="10" stroke="#2D2D2D" stroke-width="4" fill="none" />

  <!-- Inneres Netzwerk -->
  <line x1="30" y1="30" x2="70" y2="70" stroke="#666" stroke-width="2" />
  <line x1="30" y1="70" x2="70" y2="30" stroke="#666" stroke-width="2" />
  <line x1="30" y1="30" x2="30" y2="70" stroke="#666" stroke-width="2" />
  <line x1="70" y1="30" x2="70" y2="70" stroke="#666" stroke-width="2" />

  <!-- Knotenpunkte für die vier Architektur-Objekte -->
  <circle cx="30" cy="30" r="5" fill="#007BFF" /> <!-- Business Capability (Blau) -->
  <circle cx="70" cy="30" r="5" fill="#28A745" /> <!-- Application Component (Grün) -->
  <circle cx="30" cy="70" r="5" fill="#FFC107" /> <!-- Application Interface (Gelb) -->
  <circle cx="70" cy="70" r="5" fill="#DC3545" /> <!-- Business Object (Rot) -->
</svg>
