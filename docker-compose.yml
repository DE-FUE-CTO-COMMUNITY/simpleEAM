# filepath: /home/mf2admin/simple-eam-try2/docker-compose.yml
services:
  # Neo4j-Datenbank
  neo4j:
    image: neo4j:5.26
    container_name: simple-eam-neo4j
    ports:
      - '${NEO4J_EXTERNAL_PORT}:${NEO4J_PORT}' # HTTP
      - '${NEO4J_EXTERNAL_BOLT_PORT}:${NEO4J_BOLT_PORT}' # Bolt (externer Port auf 7688 geändert, um Konflikt zu vermeiden)
    volumes:
      - ./db/data:/data
      - ./db/logs:/logs
      - ./db/import:/import
      - ./db/plugins:/plugins
    environment:
      - NEO4J_AUTH=${NEO4J_AUTH}
      - NEO4J_dbms_memory_pagecache_size=${NEO4J_PAGECACHE_MEMORY}
      - NEO4J_dbms_memory_heap_initial__size=${NEO4J_HEAP_INITIAL_SIZE}
      - NEO4J_dbms_memory_heap_max__size=${NEO4J_HEAP_MAX_SIZE}
    networks:
      - eam-network
      - ${TRAEFIK_NETWORK}
    labels:
      - traefik.enable=true
      - traefik.http.routers.neo4j.rule=Host(`${NEO4J_SUBDOMAIN}.${BASE_DOMAIN}`)
      - traefik.http.routers.neo4j.entrypoints=websecure
      - traefik.http.routers.neo4j.tls=true
      - traefik.http.routers.neo4j.tls.certresolver=${TRAEFIK_CERTRESOLVER}
      - traefik.http.routers.neo4j.tls.domains[0].main=${NEO4J_SUBDOMAIN}.${BASE_DOMAIN}
      - traefik.http.services.neo4j.loadbalancer.server.port=${NEO4J_PORT}
      - 'traefik.docker.network=${TRAEFIK_NETWORK}'

  # Server
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: simple-eam-server
    ports:
      - '${GRAPHQL_EXTERNAL_PORT}:${GRAPHQL_INTERNAL_PORT}'
    depends_on:
      - neo4j
      - keycloak
    environment:
      - NODE_ENV=development
      - NEO4J_URI=bolt://neo4j:${NEO4J_BOLT_PORT}
      - NEO4J_USER=${NEO4J_USER}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - PORT=${GRAPHQL_INTERNAL_PORT}
      - KEYCLOAK_URL=http://keycloak:${KEYCLOAK_INTERNAL_PORT}
      - KEYCLOAK_REALM=${KEYCLOAK_REALM}
      - KEYCLOAK_CLIENT_ID=${KEYCLOAK_CLIENT_ID_SERVER}
    volumes:
      - ./server/src:/app/server/src
      - ./server/prisma:/app/server/prisma
      - ./server/tests:/app/server/tests
    networks:
      - eam-network
      - ${TRAEFIK_NETWORK}
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.graphql.rule=Host(`${API_SUBDOMAIN}.${BASE_DOMAIN}`)'
      - 'traefik.http.routers.graphql.entrypoints=websecure'
      - 'traefik.http.routers.graphql.tls=true'
      - 'traefik.http.routers.graphql.tls.certresolver=${TRAEFIK_CERTRESOLVER}'
      - traefik.http.routers.graphql.tls.domains[0].main=${API_SUBDOMAIN}.${BASE_DOMAIN}
      - 'traefik.http.services.graphql.loadbalancer.server.port=${GRAPHQL_INTERNAL_PORT}'
      - 'traefik.docker.network=${TRAEFIK_NETWORK}'

  # Keycloak für Authentifizierung
  keycloak:
    image: quay.io/keycloak/keycloak:23.0
    container_name: simple-eam-keycloak
    ports:
      - '${KEYCLOAK_EXTERNAL_PORT}:${KEYCLOAK_INTERNAL_PORT}'
    environment:
      - KEYCLOAK_ADMIN=${KEYCLOAK_ADMIN}
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD}
      - KC_DB=${KC_DB}
      - KC_DB_URL=jdbc:postgresql://keycloak-db:5432/${KC_DB_NAME}
      - KC_DB_USERNAME=${KC_DB_USER}
      - KC_DB_PASSWORD=${KC_DB_PASSWORD}
      - KC_HOSTNAME=${AUTH_SUBDOMAIN}.${BASE_DOMAIN}
      - KC_HOSTNAME_STRICT=false
      - KC_HOSTNAME_STRICT_HTTPS=false
      - KC_PROXY=edge
      - KC_HEALTH_ENABLED=true
    command:
      - start-dev
      - --import-realm
    volumes:
      - ./auth/src:/opt/keycloak/data/import
      - ./auth/themes:/opt/keycloak/themes
    depends_on:
      - keycloak-db
    networks:
      - eam-network
      - ${TRAEFIK_NETWORK}
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.keycloak.rule=Host(`${AUTH_SUBDOMAIN}.${BASE_DOMAIN}`)'
      - 'traefik.http.routers.keycloak.entrypoints=websecure'
      - 'traefik.http.routers.keycloak.tls=true'
      - 'traefik.http.routers.keycloak.tls.certresolver=${TRAEFIK_CERTRESOLVER}'
      - traefik.http.routers.keycloak.tls.domains[0].main=${AUTH_SUBDOMAIN}.${BASE_DOMAIN}
      - 'traefik.http.services.keycloak.loadbalancer.server.port=${KEYCLOAK_INTERNAL_PORT}'
      - 'traefik.docker.network=${TRAEFIK_NETWORK}'

  # Keycloak-Datenbank
  keycloak-db:
    image: postgres:15
    container_name: simple-eam-keycloak-db
    volumes:
      - keycloak-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${KC_DB_NAME}
      - POSTGRES_USER=${KC_DB_USER}
      - POSTGRES_PASSWORD=${KC_DB_PASSWORD}
    networks:
      - eam-network

  # Next.js Client
  client:
    build:
      context: .
      dockerfile: client/Dockerfile
    container_name: simple-eam-client

    depends_on:
      - server
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_GRAPHQL_URL=https://${API_SUBDOMAIN}.${BASE_DOMAIN}/graphql
      - NEXT_PUBLIC_KEYCLOAK_URL=https://${AUTH_SUBDOMAIN}.${BASE_DOMAIN}
      - NEXT_PUBLIC_KEYCLOAK_REALM=${KEYCLOAK_REALM}
      - NEXT_PUBLIC_KEYCLOAK_CLIENT_ID=${KEYCLOAK_CLIENT_ID_CLIENT}
    networks:
      - eam-network
      - ${TRAEFIK_NETWORK}
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.client.rule=Host(`${CLIENT_SUBDOMAIN}.${BASE_DOMAIN}`)'
      - 'traefik.http.routers.client.entrypoints=websecure'
      - 'traefik.http.routers.client.tls=true'
      - 'traefik.http.routers.client.tls.certresolver=${TRAEFIK_CERTRESOLVER}'
      - 'traefik.http.routers.client.tls.domains[0].main=${CLIENT_SUBDOMAIN}.${BASE_DOMAIN}'
      - 'traefik.http.services.client.loadbalancer.server.port=${CLIENT_PORT}'
      - 'traefik.docker.network=${TRAEFIK_NETWORK}'

networks:
  eam-network:
    driver: bridge
  traefik:
    external: true

volumes:
  keycloak-data:
