services:
  # Neo4j-Datenbank
  neo4j:
    image: neo4j:5.26
    container_name: simple-eam-neo4j
    ports:
      - '7475:7474' # HTTP
      - '7688:7687' # Bolt (externer Port auf 7688 geändert, um Konflikt zu vermeiden)
    volumes:
      - ./db/data:/data
      - ./db/logs:/logs
      - ./db/import:/import
      - ./db/plugins:/plugins
    environment:
      - NEO4J_AUTH=neo4j/eam_password
      - NEO4J_dbms_memory_pagecache_size=1G
      - NEO4J_dbms_memory_heap_initial__size=1G
      - NEO4J_dbms_memory_heap_max__size=2G
    networks:
      - eam-network
      - traefik
    labels:
      - traefik.enable=true
      - traefik.http.routers.neo4j.rule=Host(`neo4j.dev-server.mf2.eu`)
      - traefik.http.routers.neo4j.entrypoints=websecure
      - traefik.http.routers.neo4j.tls=true
      - traefik.http.routers.neo4j.tls.certresolver=netcupdns
      - traefik.http.routers.neo4j.tls.domains[0].main=neo4j.dev-server.mf2.eu
      - traefik.http.services.neo4j.loadbalancer.server.port=7474
      - 'traefik.docker.network=traefik'

  # GraphQL-Server
  graphql-server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: simple-eam-server
    ports:
      - '4500:4000'
    depends_on:
      - neo4j
      - keycloak
    environment:
      - NODE_ENV=development
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=eam_password
      - PORT=4000
      - KEYCLOAK_URL=http://keycloak:8081
      - KEYCLOAK_REALM=simple-eam
      - KEYCLOAK_CLIENT_ID=eam-server
    volumes:
      - ./server:/app
      - /app/node_modules
    networks:
      - eam-network
      - traefik
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.graphql.rule=Host(`api.dev-server.mf2.eu`)'
      - 'traefik.http.routers.graphql.entrypoints=websecure'
      - 'traefik.http.routers.graphql.tls=true'
      - 'traefik.http.routers.graphql.tls.certresolver=netcupdns'
      - traefik.http.routers.graphql.tls.domains[0].main=api.dev-server.mf2.eu
      - 'traefik.http.services.graphql.loadbalancer.server.port=4000'
      - 'traefik.docker.network=traefik'

  # Keycloak für Authentifizierung
  keycloak:
    image: quay.io/keycloak/keycloak:23.0
    container_name: simple-eam-keycloak
    ports:
      - '8081:8080'
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://keycloak-db:5432/keycloak
      - KC_DB_USERNAME=keycloak
      - KC_DB_PASSWORD=keycloak
      - KC_HOSTNAME=auth.dev-server.mf2.eu
      - KC_HOSTNAME_STRICT=false
      - KC_HOSTNAME_STRICT_HTTPS=false
      - KC_PROXY=edge
      - KC_HEALTH_ENABLED=true
    command:
      - start-dev
      - --import-realm
    volumes:
      - ./auth/src:/opt/keycloak/data/import
      - ./auth/themes:/opt/keycloak/themes
    depends_on:
      - keycloak-db
    networks:
      - eam-network
      - traefik
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.keycloak.rule=Host(`auth.dev-server.mf2.eu`)'
      - 'traefik.http.routers.keycloak.entrypoints=websecure'
      - 'traefik.http.routers.keycloak.tls=true'
      - 'traefik.http.routers.keycloak.tls.certresolver=netcupdns'
      - traefik.http.routers.keycloak.tls.domains[0].main=auth.dev-server.mf2.eu
      - 'traefik.http.services.keycloak.loadbalancer.server.port=8080'
      - 'traefik.docker.network=traefik'

  # Keycloak-Datenbank
  keycloak-db:
    image: postgres:15
    container_name: simple-eam-keycloak-db
    volumes:
      - keycloak-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=keycloak
      - POSTGRES_USER=keycloak
      - POSTGRES_PASSWORD=keycloak
    networks:
      - eam-network

  # Next.js Client
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: simple-eam-client
    ports:
      - '3000:3000'
    volumes:
      - ./client:/app
      - /app/node_modules
    depends_on:
      - graphql-server
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_GRAPHQL_URL=https://api.dev-server.mf2.eu/graphql
      - NEXT_PUBLIC_KEYCLOAK_URL=https://auth.dev-server.mf2.eu
      - NEXT_PUBLIC_KEYCLOAK_REALM=simple-eam
      - NEXT_PUBLIC_KEYCLOAK_CLIENT_ID=eam-client
    networks:
      - eam-network
      - traefik
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.client.rule=Host(`eam.dev-server.mf2.eu`)'
      - 'traefik.http.routers.client.entrypoints=websecure'
      - 'traefik.http.routers.client.tls=true'
      - 'traefik.http.routers.client.tls.certresolver=netcupdns'
      - traefik.http.routers.client.tls.domains[0].main=eam.dev-server.mf2.eu
      - 'traefik.http.services.client.loadbalancer.server.port=3000'
      - 'traefik.docker.network=traefik'

networks:
  eam-network:
    driver: bridge
  traefik:
    external: true

volumes:
  keycloak-data:
