artifact: query-library-metadata
version: '1.0.0'
selectionMode: query-id-only
dynamicQueryGenerationAllowed: false
queries:
  - queryId: entity.searchByName
    kind: list
    description: Generic governed entity search by name.
    rootQueries:
      - applications
      - businessCapabilities
      - applicationInterfaces
      - dataObjects
      - infrastructures
      - businessProcesses
      - softwareProducts
    entityTypes:
      - Application
      - BusinessCapability
      - ApplicationInterface
      - DataObject
      - Infrastructure
      - BusinessProcess
      - SoftwareProduct
    allowedIntents:
      - ENTITY_SEARCH
    parameterMode: structured-args
    companyScopeRuleIds:
      - company-scope-company
    sourceModules:
      - artifacts/query-library.json
  - queryId: entity.detailsById
    kind: list
    description: Generic governed entity detail lookup by id.
    rootQueries:
      - applications
      - businessCapabilities
      - applicationInterfaces
      - dataObjects
      - infrastructures
      - businessProcesses
      - softwareProducts
    entityTypes:
      - Application
      - BusinessCapability
      - ApplicationInterface
      - DataObject
      - Infrastructure
      - BusinessProcess
      - SoftwareProduct
    allowedIntents:
      - ENTITY_DETAILS
    parameterMode: structured-args
    companyScopeRuleIds:
      - company-scope-company
    sourceModules:
      - artifacts/query-library.json
  - queryId: entity.gap.byRelation
    kind: list
    description: Generic governed gap analysis using relation none-filters.
    rootQueries:
      - applications
      - businessCapabilities
      - applicationInterfaces
      - dataObjects
      - businessProcesses
    entityTypes:
      - Application
      - BusinessCapability
      - ApplicationInterface
      - DataObject
      - BusinessProcess
    allowedIntents:
      - ENTITY_GAP_ANALYSIS
    parameterMode: structured-args
    companyScopeRuleIds:
      - company-scope-company
    sourceModules:
      - artifacts/query-library.json
  - queryId: entity.relation.someByNameContains
    kind: list
    description: Generic governed relation traversal with deterministic related-entity filters.
    rootQueries:
      - applications
      - businessCapabilities
      - applicationInterfaces
      - dataObjects
      - infrastructures
      - businessProcesses
    entityTypes:
      - Application
      - BusinessCapability
      - ApplicationInterface
      - DataObject
      - Infrastructure
      - BusinessProcess
    allowedIntents:
      - ENTITY_RELATION_FILTER
    parameterMode: structured-args
    companyScopeRuleIds:
      - company-scope-company
    sourceModules:
      - artifacts/query-library.json
  - queryId: entity.countByStatus
    kind: count
    description: Generic governed entity counts by status.
    rootQueries:
      - applicationsConnection
      - businessCapabilitiesConnection
      - applicationInterfacesConnection
      - infrastructuresConnection
      - businessProcessesConnection
    entityTypes:
      - Application
      - BusinessCapability
      - ApplicationInterface
      - Infrastructure
      - BusinessProcess
    allowedIntents:
      - COUNT_ENTITIES
    parameterMode: structured-args
    companyScopeRuleIds:
      - company-scope-company
    sourceModules:
      - artifacts/query-library.json
