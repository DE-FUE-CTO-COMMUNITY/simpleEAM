name: Build and Push Images

on:
  push:
    branches:
      - main
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io

jobs:
  docker-build-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - id: client
            image: nextgen-eam-client
            dockerfile: client/Dockerfile
          - id: ai-server
            image: nextgen-eam-ai-server
            dockerfile: ai-server/Dockerfile
          - id: ai-worker
            image: nextgen-eam-ai-worker
            dockerfile: ai-server/Dockerfile
          - id: server
            image: nextgen-eam-server
            dockerfile: server/Dockerfile
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Normalize image prefix (lowercase org only)
        run: echo "IMAGE_PREFIX=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push ${{ matrix.service.id }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service.image }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service.image }}:sha-${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.title=${{ matrix.service.image }}
          cache-from: type=gha,scope=${{ matrix.service.id }}
          cache-to: type=gha,scope=${{ matrix.service.id }},mode=max

      # Ensures the package stays public after every push.
      # Requires PACKAGES_TOKEN secret (PAT with write:packages scope).
      # Skipped silently when the secret is absent (e.g. on mf2 remote).
      - name: Make package public
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.PACKAGES_TOKEN }}
        run: |
          if [[ -z "${GH_TOKEN}" ]]; then
            echo "PACKAGES_TOKEN not set – skipping."
            exit 0
          fi

          OWNER="${GITHUB_REPOSITORY_OWNER,,}"
          PKG="${{ matrix.service.image }}"

          http_code=$(curl -s -o /tmp/api_resp.json -w "%{http_code}" \
            -X PATCH \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/orgs/${OWNER}/packages/container/${PKG}" \
            -d '{"visibility":"public"}')

          if [[ "${http_code}" == "200" ]]; then
            echo "✓ ghcr.io/${OWNER}/${PKG} is public"
          else
            echo "✗ Failed (HTTP ${http_code}):" && cat /tmp/api_resp.json && exit 1
          fi
