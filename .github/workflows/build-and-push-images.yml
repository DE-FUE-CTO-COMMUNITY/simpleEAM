name: Build and Push Images

on:
  push:
    branches:
      - main
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io

jobs:
  docker-build-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - id: client
            image: nextgen-eam-client
            dockerfile: client/Dockerfile
          - id: ai-server
            image: nextgen-eam-ai-server
            dockerfile: ai-server/Dockerfile
          - id: ai-worker
            image: nextgen-eam-ai-worker
            dockerfile: ai-server/Dockerfile
          - id: server
            image: nextgen-eam-server
            dockerfile: server/Dockerfile
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Normalize image prefix (lowercase repo)
        run: echo "IMAGE_PREFIX=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push ${{ matrix.service.id }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service.image }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service.image }}:sha-${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.title=${{ matrix.service.image }}
          cache-from: type=gha,scope=${{ matrix.service.id }}
          cache-to: type=gha,scope=${{ matrix.service.id }},mode=max

      # GITHUB_TOKEN cannot change package visibility – a PAT is required.
      # Create a PAT (classic) with the `write:packages` scope and store it
      # as a repository secret named PACKAGES_TOKEN.
      # Without this secret the step exits early as a no-op.
      - name: Make package public
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.PACKAGES_TOKEN }}
        run: |
          # Exit early when the secret is not configured (e.g. on mf2 remote)
          if [[ -z "${GH_TOKEN}" ]]; then
            echo "PACKAGES_TOKEN not configured – skipping visibility update."
            exit 0
          fi

          OWNER="${GITHUB_REPOSITORY_OWNER,,}"
          REPO="${GITHUB_REPOSITORY#*/}"
          REPO="${REPO,,}"
          PKG="${REPO}/${{ matrix.service.image }}"
          # Encode the slash so it is not treated as a URL path separator
          PKG_ENCODED="${PKG//\//%2F}"

          echo "Setting ghcr.io/${OWNER}/${PKG} visibility to public …"

          # Use curl instead of gh api – gh api re-parses %2F as a path separator
          # which produces an invalid endpoint and a 404 response.
          http_code=$(curl -s -o /tmp/api_resp.json -w "%{http_code}" \
            -X PATCH \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/orgs/${OWNER}/packages/container/${PKG_ENCODED}" \
            -d '{"visibility":"public"}')

          if [[ "${http_code}" == "200" ]]; then
            echo "✓ Package is now public (org namespace)"
          else
            # Fallback: personal/user namespace
            http_code=$(curl -s -o /tmp/api_resp.json -w "%{http_code}" \
              -X PATCH \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/user/packages/container/${PKG_ENCODED}" \
              -d '{"visibility":"public"}')
            if [[ "${http_code}" == "200" ]]; then
              echo "✓ Package is now public (user namespace)"
            else
              echo "✗ Failed to set visibility (HTTP ${http_code}):"
              cat /tmp/api_resp.json
              exit 1
            fi
          fi
