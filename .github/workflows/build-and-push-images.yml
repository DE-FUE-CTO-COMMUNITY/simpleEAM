name: Build and Push Images

on:
  push:
    branches:
      - main
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io

jobs:
  docker-build-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - id: client
            image: nextgen-eam-client
            dockerfile: client/Dockerfile
          - id: ai-server
            image: nextgen-eam-ai-server
            dockerfile: ai-server/Dockerfile
          - id: ai-worker
            image: nextgen-eam-ai-worker
            dockerfile: ai-server/Dockerfile
          - id: server
            image: nextgen-eam-server
            dockerfile: server/Dockerfile
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Normalize image prefix (lowercase repo)
        run: echo "IMAGE_PREFIX=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push ${{ matrix.service.id }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service.image }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service.image }}:sha-${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.title=${{ matrix.service.image }}
          cache-from: type=gha,scope=${{ matrix.service.id }}
          cache-to: type=gha,scope=${{ matrix.service.id }},mode=max

      # GITHUB_TOKEN cannot change package visibility – a PAT is required.
      # Create a PAT (classic) with the `write:packages` scope and store it
      # as a repository secret named PACKAGES_TOKEN.
      # Without this secret the step is skipped and packages remain private.
      - name: Make package public
        if: >
          github.event_name == 'push' &&
          github.ref == 'refs/heads/main' &&
          env.HAS_PACKAGES_TOKEN == 'true'
        env:
          GH_TOKEN: ${{ secrets.PACKAGES_TOKEN }}
          HAS_PACKAGES_TOKEN: ${{ secrets.PACKAGES_TOKEN != '' }}
        run: |
          OWNER="${GITHUB_REPOSITORY_OWNER,,}"
          REPO_LC="${GITHUB_REPOSITORY#*/}"
          REPO_LC="${REPO_LC,,}"
          # Package name inside the owner namespace: <repo>/<image>
          PKG="${REPO_LC}/${{ matrix.service.image }}"
          # URL-encode the slash
          PKG_ENCODED="${PKG/\//%2F}"

          echo "Setting ghcr.io/${OWNER}/${PKG} visibility to public …"

          # Try as org package first; fall back to user package
          gh api --method PATCH \
            "/orgs/${OWNER}/packages/container/${PKG_ENCODED}" \
            -f visibility=public \
          || gh api --method PATCH \
            "/user/packages/container/${PKG_ENCODED}" \
            -f visibility=public
