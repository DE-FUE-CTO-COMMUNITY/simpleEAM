"""
Mögliche Status-Werte für eine Business Capability
"""
enum CapabilityStatus {
  ACTIVE
  PLANNED
  RETIRED
}

"""
Typen für Business Capabilities
"""
enum CapabilityType {
  STRATEGIC
  OPERATIONAL
  SUPPORT
}

"""
Mögliche Status-Werte für eine Applikation
"""
enum ApplicationStatus {
  ACTIVE
  IN_DEVELOPMENT
  RETIRED
}

"""
Kritikalitätsstufen für Applikationen
"""
enum CriticalityLevel {
  LOW
  MEDIUM
  HIGH
  CRITICAL
}

"""
TIME-Kategorien für Applikationen zur strategischen Klassifizierung
"""
enum TimeCategory {
  TOLERATE
  INVEST
  MIGRATE
  ELIMINATE
}

"""
7R-Strategien für Cloud-Migration und Applikationsportfolio-Management
"""
enum SevenRStrategy {
  RETIRE
  RETAIN
  REHOST
  REPLATFORM
  REFACTOR
  REARCHITECT
  REPLACE
}

"""
Datenklassifikation für Business-Datenobjekte
"""
enum DataClassification {
  PUBLIC
  INTERNAL
  CONFIDENTIAL
  STRICTLY_CONFIDENTIAL
}

"""
Schnittstellentypen für Applikationsschnittstellen
"""
enum InterfaceType {
  API
  FILE
  DATABASE
  MESSAGE_QUEUE
  OTHER
}

"""
Protokolle für Applikationsschnittstellen
"""
enum InterfaceProtocol {
  REST
  SOAP
  GRAPHQL
  HTTP
  HTTPS
  FTP
  SFTP
  TCP
  UDP
  SMTP
  LDAP
  JDBC
  ODBC
  ORACLE
  MQTT
  OTHER
}

"""
Status für Applikationsschnittstellen
"""
enum InterfaceStatus {
  ACTIVE
  IN_DEVELOPMENT
  OUT_OF_SERVICE
  PLANNED
  DEPRECATED
}

"""
Architecture - repräsentiert eine Architektur im Enterprise Architecture Management
"""
type Architecture
  @node
  @authorization(
    validate: [
      { operations: [CREATE, UPDATE, DELETE], where: { jwt: { roles: { includes: "architect" } } } }
      { operations: [CREATE, UPDATE, DELETE], where: { jwt: { roles: { includes: "admin" } } } }
    ]
    filter: [
      {
        where: {
          OR: [
            { jwt: { roles: { includes: "admin" } } }
            { node: { company: { some: { id_IN: "$jwt.company_ids" } } } }
          ]
        }
      }
    ]
  ) {
  id: ID! @id
  name: String!
  description: String
  timestamp: DateTime!
  domain: ArchitectureDomain!
  type: ArchitectureType!
  tags: [String!]
  createdAt: DateTime! @timestamp(operations: [CREATE])
  updatedAt: DateTime @timestamp(operations: [UPDATE])
  company: [Company!]! @relationship(type: "OWNED_BY", direction: OUT)
  owners: [Person!]! @relationship(type: "OWNED_BY", direction: OUT)
  containsCapabilities: [BusinessCapability!]! @relationship(type: "CONTAINS", direction: OUT)
  containsApplications: [Application!]! @relationship(type: "CONTAINS", direction: OUT)
  containsDataObjects: [DataObject!]! @relationship(type: "CONTAINS", direction: OUT)
  containsInterfaces: [ApplicationInterface!]! @relationship(type: "CONTAINS", direction: OUT)
  containsInfrastructure: [Infrastructure!]! @relationship(type: "CONTAINS", direction: OUT)
  containsAIAssets: [AIAsset!]! @relationship(type: "CONTAINS", direction: OUT)
  parentArchitecture: [Architecture!]! @relationship(type: "PART_OF", direction: OUT)
  childArchitectures: [Architecture!]! @relationship(type: "PART_OF", direction: IN)
  diagrams: [Diagram!]! @relationship(type: "BELONGS_TO", direction: IN)
  appliedPrinciples: [ArchitecturePrinciple!]!
    @relationship(type: "APPLIES_PRINCIPLE", direction: OUT)
}

